<!DOCTYPE html>
<html>
<head>
    <title>Acme Corp Employee Management</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:#f0f2f5;
            margin:0;
            padding:0;
        }

        .header{
            background:#007BFF;
            color:white;
            text-align:center;
            padding:20px 0;
            font-size:28px;
            font-weight:bold;
            box-shadow:0 4px 6px rgba(0,0,0,0.1);
        }

        .container{
            width:90%;
            max-width:800px;
            margin:30px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.1);
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
            border-radius:5px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            padding:12px 25px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#218838;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th, td{
            padding:12px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#007BFF;
            color:white;
        }

        .high-salary th{
            background:#ffc107;
        }

        h3{
            margin-top:30px;
            color:#333;
        }
    </style>
</head>
<body>

<div class="header">
    ACME Corp Employee Management
</div>

<div class="container">
    <h2>Enter Employee Details</h2>
    <input type="text" id="name" placeholder="Employee Name"><br>
    <input type="text" id="branch" placeholder="Branch/Department"><br>
    <input type="number" id="salary" placeholder="Salary"><br>
    <button onclick="addEmployee()">Add Employee</button>

    <h3>All Employees</h3>
    <table id="allEmployees">
        <tr>
            <th>Name</th>
            <th>Branch</th>
            <th>Salary</th>
        </tr>
    </table>

    <h3>High Salary Employees (Salary > 50,000)</h3>
    <table id="highSalary" class="high-salary">
        <tr>
            <th>Name</th>
            <th>Branch</th>
            <th>Salary</th>
        </tr>
    </table>
</div>

<script>
function addEmployee(){
    let name = document.getElementById("name").value.trim();
    let branch = document.getElementById("branch").value.trim();
    let salary = Number(document.getElementById("salary").value);

    if(name === "" || branch === "" || isNaN(salary)){
        alert("Please fill all fields correctly!");
        return;
    }

    // Add to All Employees Table
    let allTable = document.getElementById("allEmployees");
    let newRow = allTable.insertRow();
    newRow.insertCell(0).innerText = name;
    newRow.insertCell(1).innerText = branch;
    newRow.insertCell(2).innerText = "₹" + salary.toLocaleString();

    // Add to High Salary Table if salary > 50k
    if(salary > 50000){
        let highTable = document.getElementById("highSalary");
        let highRow = highTable.insertRow();
        highRow.insertCell(0).innerText = name;
        highRow.insertCell(1).innerText = branch;
        highRow.insertCell(2).innerText = "₹" + salary.toLocaleString();
    }

    // Clear input fields
    document.getElementById("name").value = "";
    document.getElementById("branch").value = "";
    document.getElementById("salary").value = "";
}
</script>

</body>
</html>
