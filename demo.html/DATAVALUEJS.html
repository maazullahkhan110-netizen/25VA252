<!DOCTYPE html>
<html lang="en">    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JavaScript Data Types Demo</title>
    </head>
    <body>
        <script>
            // PRIMITIVE : SINGLR VALUE(IMMUTABLE)
            //STRING/NUMBER/BOOLEAN/NULL/UNDEFINED/SYMBOL/BIGINT
            let name = "maaz"; 
            let age=23;
            let isMarried=false;
            let address=null;
            let education;
            console.log(name); 
            console .log(typeof name);,
            //bigint
            let salary=BigInt(123456789012345678901234567890123456);
            console.log(salary);
             
            //symbol
            let name1=Symbol("vikas");
            let name2=Symbol("vikas");
            console.log(name1==name2); //false aaega kyuki symbol unique hota hai

            //NON-PRIMITIVE/REFERENCE : MULTIPLE VALUE(MUTABLE)
            //OBJECT/ARRAY/FUNCTION
            //OBJECT{}-collection of its keys and values.

            let student={ name:"vikas",
            age:23,
            isMarried:false,
            address:{
                streetNo:23,
                area:"indirapuram",
                pincode:201014,
                city:"gzb",

            },
            course:"b.tech",
            branch:"cse",
            year:2025,
            getInfo:function(){
                return "MY Education is "+ student.course+"  "+ student.branch+" and year is "+ student.year;  
            }
            
           


            };
            console.log(student);
            //access object's keys/property
            //using dot notation
            console.log(student.name + "  " + student.age + " " + student.address.city); 
            console.log(typeof student); //object
            console.log(student.getInfo()); 

            //find objects propertyin object

            console.log('age' in student); 

            //delete objects property
            console.log(delete student.name);
            console.log(student);   
            console.log('name' in student); 
            //access objects keys/property using bracket notation
            console.log(student["isMarried"]);




        </script>
    </body>
